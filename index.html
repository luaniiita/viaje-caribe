<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ MÓVIL -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🌴 Viaje Caribe</title>

<!-- ✅ Firebase (BIEN) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-ript>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- ✅ Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI';
  background:#0f2027;
  margin:0;
}

.container{
  max-width:480px;
  margin:auto;
  background:#f4f6f9;
  min-height:100vh;
  padding:15px;
}

h1{text-align:center;}

.tabs{
  display:flex;
  background:white;
  border-radius:16px;
  margin-bottom:10px;
}

.tab{
  flex:1;
  padding:14px;
  text-align:center;
  cursor:pointer;
}

.tab.active{
  background:#2c5364;
  color:white;
}

.section{display:none;}
.section.active{display:block;}

input,select,textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  font-size:16px;
  border-radius:14px;
}

button{
  width:100%;
  padding:15px;
  background:#2c5364;
  color:white;
  border:none;
  border-radius:14px;
}

.card{
  background:white;
  padding:12px;
  border-radius:16px;
  margin-top:10px;
}

.delete{
  background:red;
}

#map{height:320px;border-radius:16px;}
</style>
</head>

<body>

<div class="container">

<h1>🌊 Luana & Daniel</h1>

<div class="tabs">
  <div class="tab active" onclick="tab('resumen',this)">🏠</div>
  <div class="tab" onclick="tab('gastos',this)">💰</div>
  <div class="tab" onclick="tab('notas',this)">📝</div>
  <div class="tab" onclick="tab('mapa',this)">🗺️</div>
</div>

<!-- RESUMEN -->
<div id="resumen" class="section active">
<h2>Total: <span id="totalEUR">0</span>€</h2>
<p id="resultado"></p>
<canvas id="graf"></canvas>
</div>

<!-- GASTOS -->
<div id="gastos" class="section">

<select id="pagador">
<option>Luana</option>
<option>Daniel</option>
</select>

<select id="destino">
<option>Preparativos</option>
<option>Miami</option>
<option>Roatán</option>
<option>Costa Maya</option>
<option>Cozumel</option>
<option>Ocean Cay</option>
</select>

<input id="concepto" placeholder="Concepto">
<input id="precio" type="number" placeholder="Precio">

<button onclick="add()">Añadir gasto</button>

<div id="lista"></div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<textarea id="ideas"></textarea>
</div>

<!-- MAPA -->
<div id="mapa" class="section">
<div id="map"></div>
</div>

</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDnwz0jY9MsIEJFzlX-Pcai_jF4djHL_Kg",
  authDomain: "viaje---caribe-c1b70.firebaseapp.com",
  projectId: "viaje---caribe-c1b70"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// tabs
function tab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');

  if(id==="mapa"){
    setTimeout(()=>map.invalidateSize(),200);
  }
}

// añadir
function add(){
  let precio = parseFloat(document.getElementById('precio').value);
  if(!precio) return;

  db.collection("gastos").add({
    pagador: pagador.value,
    destino: destino.value,
    concepto: concepto.value,
    eur: precio
  });

  document.getElementById("precio").value="";
  document.getElementById("concepto").value="";
}

// borrar
function borrar(id){
  db.collection("gastos").doc(id).delete();
}

let datos=[];

// realtime
db.collection("gastos").onSnapshot(snap=>{
  datos=[];
  snap.forEach(doc=>datos.push({id:doc.id,...doc.data()}));
  render();
});

function render(){
  let total=0;
  let daniel=0;

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  datos.forEach(g=>{
    total+=g.eur;
    if(g.pagador==="Daniel") daniel+=g.eur;

    lista.innerHTML+=`
    <div class="card">
      <b>${g.pagador}</b> ${g.eur}€
      <br>${g.concepto}
      <button class="delete" onclick="borrar('${g.id}')">Eliminar</button>
    </div>`;
  });

  totalEUR.textContent = total.toFixed(2);

  let mitad=total/2;
  let balance=mitad-daniel;

  resultado.textContent = balance>0
    ? `Daniel paga ${balance.toFixed(2)}€`
    : `Luana paga ${Math.abs(balance).toFixed(2)}€`;
}

// mapa
let map=L.map('map').setView([25,-80],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click',e=>{
  let nombre=prompt("Sitio");
  if(!nombre)return;

  db.collection("lugares").add({
    nombre,
    lat:e.latlng.lat,
    lng:e.latlng.lng
  });
});

db.collection("lugares").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let s=doc.data();
    L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.nombre);
  });
});

// notas
ideas.value=localStorage.getItem("ideas")||"";
ideas.oninput=()=>localStorage.setItem("ideas",ideas.value);

</script>

</body>
</html>
``
