<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>🌴 Viaje Caribe</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
  margin:0;
  font-family:-apple-system, 'Segoe UI';
  background:#0f2027;
}

/* CONTENEDOR */
.container{
  max-width:480px;
  margin:auto;
  background:#f4f6f9;
  min-height:100vh;
  padding:15px;
  padding-bottom:80px;
}

/* TITULO */
h1{
  text-align:center;
}

/* SECCIONES */
.section{display:none;}
.section.active{display:block;}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:14px;
}

/* BOTONES */
button{
  width:100%;
  padding:14px;
  background:#2c5364;
  color:white;
  border:none;
  border-radius:14px;
}

/* TARJETAS */
.card{
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
}

/* MAPA */
#map{
  height:300px;
  border-radius:14px;
}

/* ✅ NAV BAR (LO NUEVO 🔥) */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:480px;
  background:white;
  display:flex;
  justify-content:space-around;
  border-top:1px solid #ddd;
}

.nav-item{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  cursor:pointer;
}

.nav-item.active{
  color:#2c5364;
  font-weight:bold;
}

.icon{
  font-size:20px;
  display:block;
}

</style>
</head>

<body>

<div class="container">

<h1>🌊 Luana & Daniel</h1>

<!-- RESUMEN -->
<div id="resumen" class="section active">
<h2>Total: <span id="totalEUR">0</span>€</h2>
<p id="resultado"></p>
<canvas id="graf"></canvas>
</div>

<!-- GASTOS -->
<div id="gastos" class="section">
<select id="pagador">
<option>Luana</option>
<option>Daniel</option>
</select>

<select id="destino">
<option>Preparativos</option>
<option>Miami</option>
<option>Roatán</option>
<option>Costa Maya</option>
<option>Cozumel</option>
<option>Ocean Cay</option>
</select>

<input id="concepto" placeholder="Concepto">
<input id="precio" type="number" placeholder="Precio">

<button onclick="add()">➕ Añadir gasto</button>

<div id="lista"></div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<textarea id="ideas" placeholder="Ideas..."></textarea>
</div>

<!-- MAPA -->
<div id="mapa" class="section">
<div id="map"></div>
</div>

</div>

<!-- ✅ BARRA INFERIOR -->
<div class="navbar">
  <div class="nav-item active" onclick="show('resumen',this)">
    <span class="icon">🏠</span>
    Inicio
  </div>
  <div class="nav-item" onclick="show('gastos',this)">
    <span class="icon">💰</span>
    Gastos
  </div>
  <div class="nav-item" onclick="show('notas',this)">
    <span class="icon">📝</span>
    Ideas
  </div>
  <div class="nav-item" onclick="show('mapa',this)">
    <span class="icon">🗺️</span>
    Mapa
  </div>
</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDnwz0jY9MsIEJFzlX-Pcai_jF4djHL_Kg",
  authDomain: "viaje---caribe-c1b70.firebaseapp.com",
  projectId: "viaje---caribe-c1b70"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// NAV
function show(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  el.classList.add('active');

  if(id==="mapa"){
    setTimeout(()=>map.invalidateSize(),200);
  }
}

// añadir gasto
function add(){
  let precio = parseFloat(precio.value);
  if(!precio) return;

  db.collection("gastos").add({
    pagador: pagador.value,
    destino: destino.value,
    concepto: concepto.value,
    eur: precio
  });

  precio.value="";
  concepto.value="";
}

// borrar
function borrar(id){
  db.collection("gastos").doc(id).delete();
}

let datos=[];

db.collection("gastos").onSnapshot(snap=>{
  datos=[];
  snap.forEach(doc=>datos.push({id:doc.id,...doc.data()}));
  render();
});

function render(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  let total=0;
  let daniel=0;

  datos.forEach(g=>{
    total+=g.eur;
    if(g.pagador==="Daniel") daniel+=g.eur;

    lista.innerHTML+=`
    <div class="card">
      <b>${g.pagador}</b> ${g.eur}€
      <br>${g.concepto}
      <button onclick="borrar('${g.id}')">Eliminar</button>
    </div>`;
  });

  totalEUR.textContent=total.toFixed(2);

  let mitad=total/2;
  let balance=mitad-daniel;

  resultado.textContent =
    balance>0
    ? `Daniel paga ${balance.toFixed(2)}€`
    : `Luana paga ${Math.abs(balance).toFixed(2)}€`;
}

// MAPA
let map=L.map('map').setView([25,-80],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click',e=>{
  let nombre=prompt("Sitio");
  if(!nombre)return;

  db.collection("lugares").add({
    nombre,
    lat:e.latlng.lat,
    lng:e.latlng.lng
  });
});

db.collection("lugares").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let s=doc.data();
    L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.nombre);
  });
});

// notas
ideas.value=localStorage.getItem("ideas")||"";
ideas.oninput=()=>localStorage.setItem("ideas",ideas.value);

</script>

</body>
</html>
