<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌴 Viaje Caribe</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#0f2027,#2c5364);
  margin:0;padding:10px;
}
.container{
  max-width:500px;margin:auto;
  background:white;padding:15px;border-radius:20px;
}
h1{text-align:center;color:#2c5364}

.tabs{display:flex;}
.tab{
  flex:1;padding:10px;text-align:center;
  background:#eee;margin:2px;border-radius:10px;
  cursor:pointer;
}
.tab.active{background:#2c5364;color:white;}

.section{display:none;}
.section.active{display:block;}

input,select,textarea{
  width:100%;padding:10px;margin:5px 0;
  border-radius:10px;border:1px solid #ccc;
}

button{
  width:100%;padding:10px;
  background:#2c5364;color:white;
  border:none;border-radius:10px;
  margin-top:5px;
}

.card{
  background:#f5f7fa;
  padding:10px;margin:5px 0;
  border-radius:10px;
}

#map{
  height:300px;
  border-radius:10px;
}

.delete{
  background:red;
}
</style>
</head>

<body>

<div class="container">

<h1>🌊 Luana & Daniel</h1>

<div class="tabs">
  <div class="tab active" onclick="tab('resumen',this)">🏠</div>
  <div class="tab" onclick="tab('gastos',this)">💰</div>
  <div class="tab" onclick="tab('notas',this)">📝</div>
  <div class="tab" onclick="tab('mapa',this)">🗺️</div>
</div>

<!-- RESUMEN -->
<div id="resumen" class="section active">
<p>Total: <b id="totalEUR">0</b> €</p>
<p id="resultado"></p>

<canvas id="graf"></canvas>
</div>

<!-- GASTOS -->
<div id="gastos" class="section">

<select id="pagador">
<option>Luana</option>
<option>Daniel</option>
</select>

<select id="destino">
<option>Preparativos</option>
<option>Miami</option>
<option>Roatán</option>
<option>Costa Maya</option>
<option>Cozumel</option>
<option>Ocean Cay</option>
</select>

<input id="concepto" placeholder="Concepto">
<input id="precio" type="number" placeholder="Precio (€)">

<button onclick="add()">➕ Añadir gasto</button>

<div id="lista"></div>
</div>

<!-- NOTAS -->
<div id="notas" class="section">
<textarea id="ideas" placeholder="Ideas del viaje..."></textarea>
</div>

<!-- MAPA -->
<div id="mapa" class="section">
<p>Click en el mapa para guardar sitios</p>
<div id="map"></div>
</div>

</div>

<script>

// ✅ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDnwz0jY9MsIEJFzlX-Pcai_jF4djHL_Kg",
  authDomain: "viaje---caribe-c1b70.firebaseapp.com",
  projectId: "viaje---caribe-c1b70"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// pestañas
function tab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');

  if(id==="mapa"){
    setTimeout(()=>map.invalidateSize(),200);
  }
}

// añadir gasto
function add(){
  let precio = parseFloat(document.getElementById('precio').value);
  if(!precio) return;

  db.collection("gastos").add({
    pagador: document.getElementById("pagador").value,
    destino: document.getElementById("destino").value,
    concepto: document.getElementById("concepto").value,
    eur: precio
  });

  document.getElementById("precio").value="";
  document.getElementById("concepto").value="";
}

// borrar
function borrar(id){
  db.collection("gastos").doc(id).delete();
}

// realtime
let datos=[];

db.collection("gastos").onSnapshot(snap=>{
  datos=[];
  snap.forEach(doc=>datos.push({id:doc.id,...doc.data()}));
  render();
});

// render
function render(){

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  let total=0;
  let luana=0, daniel=0;
  let destinos={};

  datos.forEach(g=>{
    total+=g.eur;

    if(g.pagador==="Luana") luana+=g.eur;
    else daniel+=g.eur;

    destinos[g.destino]=(destinos[g.destino]||0)+g.eur;

    lista.innerHTML+=`
    <div class="card">
      <b>${g.pagador}</b> ${g.eur.toFixed(2)}€
      <br>${g.concepto} (${g.destino})
      <button class="delete" onclick="borrar('${g.id}')">❌</button>
    </div>`;
  });

  document.getElementById("totalEUR").textContent=total.toFixed(2);

  let mitad=total/2;
  let balance=mitad-daniel;

  let res=document.getElementById("resultado");
  if(balance>0) res.textContent=`Daniel paga ${balance.toFixed(2)}€`;
  else res.textContent=`Luana paga ${Math.abs(balance).toFixed(2)}€`;

  // gráfico
  if(window.chart) window.chart.destroy();
  let ctx=document.getElementById("graf");

  window.chart=new Chart(ctx,{
    type:'pie',
    data:{
      labels:Object.keys(destinos),
      datasets:[{data:Object.values(destinos)}]
    }
  });
}

// 🗺️ MAPA CON CATEGORÍAS
let map=L.map('map').setView([25,-80],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

const icons={
  restaurante:L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",iconSize:[30,30]}),
  bar:L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/3176/3176363.png",iconSize:[30,30]}),
  playa:L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/869/869869.png",iconSize:[30,30]}),
  otro:L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",iconSize:[30,30]})
};

map.on('click',e=>{
  let nombre=prompt("Nombre del sitio:");
  if(!nombre)return;

  let tipo=prompt("Tipo: restaurante, bar, playa, otro");
  if(!tipo) tipo="otro";

  db.collection("lugares").add({
    nombre,
    tipo,
    lat:e.latlng.lat,
    lng:e.latlng.lng
  });
});

db.collection("lugares").onSnapshot(snapshot=>{

  map.eachLayer(layer=>{
    if(layer instanceof L.Marker) map.removeLayer(layer);
  });

  snapshot.forEach(doc=>{
    let s=doc.data();
    let icon=icons[s.tipo] || icons["otro"];

    L.marker([s.lat,s.lng],{icon})
     .addTo(map)
     .bindPopup(`<b>${s.nombre}</b><br>${s.tipo}`);
  });
});

// notas
const ideas=document.getElementById("ideas");
ideas.value=localStorage.getItem("ideas")||"";
ideas.oninput=()=>localStorage.setItem("ideas",ideas.value);

</script>

</body>
</html>
